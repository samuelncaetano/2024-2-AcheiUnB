name: OWASP ZAP Security Audit

on:
  # Permite executar o workflow manualmente através da aba "Actions"
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    name: Full Scan via Front-end

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Criar .env para testes da API
        run: |
          cat << EOF > API/.env
          MICROSOFT_CLIENT_ID=fake
          MICROSOFT_CLIENT_SECRET=fake
          DB_NAME=acheiunb
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_HOST=localhost
          DB_PORT=5432
          CLOUDINARY_CLOUD_NAME=fake
          CLOUDINARY_API_KEY=fake
          CLOUDINARY_API_SECRET=fake
          CELERY_BROKER_URL=redis://localhost:6379/0
          EOF

      # 1. Sobe o Back-end em segundo plano usando Docker Compose
      - name: Iniciar o Back-end (API)
        run: |
          cd API/
          docker compose up -d

      # 2. Prepara o ambiente Node.js para rodar o Front-end Vue.js
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Instala o wait-on para aguardar os serviços subirem
      - name: Instalar wait-on
        run: npm install -g wait-on

      # 4. Instala as dependências e roda o Front-end em segundo plano
      - name: Iniciar o Front-end (Vue)
        run: |
          cd web/
          npm install
          npm run dev &

      # 5. Aguarda até que as portas 8000 (API) e 5173 (Vue) respondam
      - name: Aguardar os serviços ficarem online
        run: wait-on -t 60000 http://localhost:8000 http://localhost:5173

      # 6. Executa a auditoria completa apontando para o Vue.js
      - name: OWASP ZAP Full Scan Ativo
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: "http://localhost:5173"
          cmd_options: "-a"
          fail_action: false

      # 7. Salva os relatórios gerados em HTML e Markdown
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ZAP-Security-Report
          path: |
            *report_html.html
            *report_md.md
